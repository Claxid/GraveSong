<!DOCTYPE html>
<html lang="fr">

<!-- Page du menu -->
<!-- Il joue la musique et a un bouton pour lancer le jeu. -->

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GraveSong - Menu</title>
	<!-- CSS pour le style du menu. -->
	<link rel="stylesheet" href="../css/menu.css">
	<!-- Police gothique. -->
	<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
	<!-- Audio du menu qui joue en boucle. -->
	<audio id="menuAudio" autoplay loop src="../assets/audio/Cathedral_of_Unfinished_Prayers.mp3"></audio>

	<main class="menu-screen">
		<!-- Titre du jeu. -->
		<h1 class="menu-title">GraveSong</h1>
		<!-- Bouton pour jouer. -->
		<button id="playButton" class="play-button" type="button">Jouer</button>
		<!-- Bouton pour lire le lore. -->
		<button id="loreButton" class="lore-button" type="button">Lore</button>
	</main>

	<!-- Script pour gérer l'audio et la navigation. -->
	<script src="../js/menu.js"></script>
</body>
</html>
